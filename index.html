<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mise AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── BACKGROUND ───────────────────────────────────── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 70% at 50% 52%,
          #1c0900 0%,
          #0d0400 40%,
          #000000 100%);
    }

    /* Primary ember glow — stoking animation then steady breath */
    .glow-blob {
      position: fixed; z-index: 1;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 560px; height: 460px;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(196,74,0,0.32) 0%,
        rgba(140,40,0,0.12) 45%,
        transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation:
        blobStoke  2.2s cubic-bezier(0.22,1,0.36,1) both,
        blobBreath 4.8s ease-in-out infinite 2.2s;
    }
    @keyframes blobStoke {
      0%   { opacity: 0;   transform: translate(-50%,-50%) scale(0.25); }
      55%  { opacity: 1;   transform: translate(-50%,-50%) scale(1.45); }
      100% { opacity: .80; transform: translate(-50%,-50%) scale(1);    }
    }
    @keyframes blobBreath {
      0%,100% { opacity: .80; transform: translate(-50%,-50%) scale(1);    }
      50%     { opacity: 1;   transform: translate(-50%,-50%) scale(1.14); }
    }

    /* Secondary hot-spot — tighter, faster, offset phase */
    .glow-blob-2 {
      position: fixed; z-index: 1;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 240px;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(255,120,10,0.16) 0%,
        rgba(200,70,0,0.06)  50%,
        transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: blobBreath2 3.1s ease-in-out infinite 0.9s;
    }
    @keyframes blobBreath2 {
      0%,100% { opacity: .45; transform: translate(-50%,-50%) scale(0.80); }
      50%     { opacity: .90; transform: translate(-50%,-50%) scale(1.22); }
    }

    /* Grain texture */
    .grain {
      position: fixed; inset: 0; z-index: 15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: .55;
    }

    /* ── IGNITION FLASH ───────────────────────────────── */
    .ignition-ring {
      position: fixed; z-index: 8;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: radial-gradient(ellipse,
        rgba(255,230,140,1.0) 0%,
        rgba(255,130,30, 0.9) 35%,
        transparent 70%);
      transform: translate(-50%,-50%) scale(0);
      animation: igniteRing 1.5s cubic-bezier(0.16,1,0.3,1) 0.35s both;
      pointer-events: none;
    }
    @keyframes igniteRing {
      0%   { transform: translate(-50%,-50%) scale(0);   opacity: 1;   }
      45%  { transform: translate(-50%,-50%) scale(120); opacity: 0.7; }
      100% { transform: translate(-50%,-50%) scale(220); opacity: 0;   }
    }

    /* ── EMBER PARTICLES ──────────────────────────────── */
    #particles {
      position: fixed; inset: 0; z-index: 12;
      pointer-events: none;
    }

    /* ── LOGO STAGE ───────────────────────────────────── */
    .stage {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .logo {
      width: min(500px, 82vw);
      height: auto;
      opacity: 0;
      animation:
        burnIn     1.05s cubic-bezier(0.16,1,0.3,1) 0.35s  both,
        blazeSettle 2.0s ease-out                   0.35s  both,
        neonPulse  3.2s ease-in-out infinite 2.4s,
        flicker    8s   ease-in-out infinite 4s;
    }

    /* 1 — Dramatic scale reveal */
    @keyframes burnIn {
      0%   { opacity: 0; transform: scale(0.72); }
      45%  { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1);    }
    }

    /* 2 — Blazing hot glow → settles to steady orange */
    @keyframes blazeSettle {
      0%, 20% {
        filter:
          drop-shadow(0 0  6px rgba(255,240,200,0.95))
          drop-shadow(0 0 28px rgba(255,140, 30,1.00))
          drop-shadow(0 0 80px rgba(232, 97, 26,0.90));
      }
      100% {
        filter:
          drop-shadow(0 0  9px rgba(232,97,26,0.90))
          drop-shadow(0 0 26px rgba(232,97,26,0.55))
          drop-shadow(0 0 65px rgba(196,74, 0,0.30));
      }
    }

    /* 3 — Steady ember heartbeat */
    @keyframes neonPulse {
      0%,100% {
        filter:
          drop-shadow(0 0  9px rgba(232,97,26,.90))
          drop-shadow(0 0 26px rgba(232,97,26,.55))
          drop-shadow(0 0 65px rgba(196,74, 0,.30));
      }
      50% {
        filter:
          drop-shadow(0 0 18px rgba(232,97,26,1.00))
          drop-shadow(0 0 52px rgba(232,97,26,.90))
          drop-shadow(0 0 120px rgba(196,74,0, .60));
      }
    }

    /* 4 — Occasional flicker (authenticity) */
    @keyframes flicker {
      0%,87%,89%,91%,93%,100% { opacity: 1;    }
      88%  { opacity: 0.55; }
      90%  { opacity: 0.92; }
      92%  { opacity: 0.72; }
    }

    /* ── TAGLINE ─────────────────────────────────────── */
    .tagline {
      margin-top: 26px;
      font-family: 'Plus Jakarta Sans', 'Helvetica Neue', sans-serif;
      font-size: clamp(9px, 2.2vw, 13px);
      font-weight: 400;
      color: rgba(232, 97, 26, 0.60);
      letter-spacing: 0.50em;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(232, 97, 26, 0.45);
      opacity: 0;
      white-space: nowrap;
      animation: tagReveal 1.0s ease-out 2.3s both;
    }
    @keyframes tagReveal {
      0%   { opacity: 0; transform: translateY(10px); letter-spacing: 0.70em; }
      100% { opacity: 1; transform: translateY(0);    letter-spacing: 0.50em; }
    }

    /* ── EXIT CURTAIN ─────────────────────────────────── */
    .curtain {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
    }
    .curtain.close { opacity: 1; }
  </style>
</head>

    <p class="tagline">Culinary Voice Assistant</p>
  </div>

  <div class="curtain" id="curtain"></div>

  <script>
    /* ── EMBER PARTICLE SYSTEM ──────────────────────────── */
    (function () {
      const canvas = document.getElementById('particles');
      const ctx    = canvas.getContext('2d');

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function Ember(stagger) {
        this.spawn(stagger);
      }
      Ember.prototype.spawn = function (stagger) {
        const cx = window.innerWidth  / 2;
        const cy = window.innerHeight / 2 + 10;   // near logo centre
        const r  = 150 + Math.random() * 90;       // radial spread
        const a  = Math.random() * Math.PI * 2;
        this.x    = cx + Math.cos(a) * r * 0.55;
        this.y    = cy + Math.sin(a) * r * 0.30 + 30;
        this.vx   = (Math.random() - 0.5) * 0.55;
        this.vy   = -(Math.random() * 1.3 + 0.45);
        this.wobble = Math.random() * Math.PI * 2;
        this.wSpeed = 0.03 + Math.random() * 0.03;
        this.size   = Math.random() * 2.4 + 0.6;
        this.hue    = 15 + Math.random() * 28;    /* deep orange → amber */
        this.sat    = 88 + Math.random() * 12;
        this.maxLife = 90 + Math.floor(Math.random() * 110);
        this.life   = stagger ? Math.floor(Math.random() * this.maxLife) : 0;
      };
      Ember.prototype.update = function () {
        this.wobble += this.wSpeed;
        this.x += this.vx + Math.sin(this.wobble) * 0.22;
        this.y += this.vy;
        this.vy *= 0.996;
        this.life++;
        if (this.life >= this.maxLife) this.spawn(false);
      };
      Ember.prototype.draw = function () {
        const t = this.life / this.maxLife;
        const alpha = t < 0.12
          ? t / 0.12
          : 1 - Math.pow((t - 0.12) / 0.88, 1.6);
        const rad = this.size * (1 - t * 0.65);
        if (rad < 0.1 || alpha < 0.01) return;
        const lum = 52 + t * 30;
        ctx.beginPath();
        ctx.arc(this.x, this.y, rad, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(' + this.hue + ',' + this.sat + '%,' + lum + '%,' + (alpha * 0.82) + ')';
        ctx.fill();
      };

      const PARTICLE_COUNT  = 38;
      const PARTICLE_DELAY  = 1600;   /* ms — wait for ignition to settle */
      const embers = Array.from({length: PARTICLE_COUNT}, function() { return new Ember(true); });

      let startTs = null;
      function tick(ts) {
        if (!startTs) startTs = ts;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (ts - startTs > PARTICLE_DELAY) {
          embers.forEach(function(e) { e.update(); e.draw(); });
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();

    /* ── TIMING & NAVIGATION ────────────────────────────── */
    const STAY_MS   = 7000;
    const NEXT_PAGE = 'mise_ai_auth_v2.html';

    setTimeout(function() {
      document.getElementById('curtain').classList.add('close');
      setTimeout(function() {
        window.location.href = NEXT_PAGE;
      }, 900);
    }, STAY_MS);
  </script>
