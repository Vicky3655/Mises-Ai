<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Inventory List — Mise AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="inventory.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     DESKTOP LAYOUT  (≥ 900px)
═══════════════════════════════════════════════════════ -->
<div class="desktop-layout">

  <!-- LEFT SIDEBAR -->
  <aside class="d-sidebar">
    <div class="d-brand">
      <div class="d-brand-logo">
        <img src="mise_ai_logo.png" alt="Mise AI"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="d-brand-fallback" style="display:none">🍽️</div>
      </div>
      <div class="d-brand-text">
        <span class="d-brand-name"><img src="image.png" alt="Mise AI"></span>
        <span class="d-brand-sub">Kitchen Manager</span>
      </div>
    </div>

    <nav class="d-nav">
      <a class="d-nav-item active" href="inventory.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 12h6M9 16h4"/>
        </svg>
        Inventory
      </a>
      <a class="d-nav-item" href="kitchen.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        My Kitchen
        <span class="d-nav-badge" id="kitchenCount">0</span>
      </a>
      <a class="d-nav-item" href="mise_ai_vision.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7.5 3.75H6A2.25 2.25 0 0 0 3.75 6v1.5M16.5 3.75H18A2.25 2.25 0 0 1 20.25 6v1.5m0 9V18A2.25 2.25 0 0 1 18 20.25h-1.5m-9 0H6A2.25 2.25 0 0 1 3.75 18v-1.5M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
        </svg>
        Scanner
      </a>
      <a class="d-nav-item" href="voice_redesign.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8"  y1="22" x2="16" y2="22"/>
        </svg>
        Voice Chat
      </a>
    </nav>

    <div class="d-stats">
      <div class="d-stat-box">
        <span class="d-stat-val" id="dTotalItems">0</span>
        <span class="d-stat-lbl">Total Items</span>
      </div>
      <div class="d-stat-box">
        <span class="d-stat-val" id="dCheckedItems">0</span>
        <span class="d-stat-lbl">Checked</span>
      </div>
      <div class="d-stat-box">
        <span class="d-stat-val" id="dKitchenSelected">0</span>
        <span class="d-stat-lbl">For Kitchen</span>
      </div>
    </div>

    <div class="d-quick">
      <p class="d-quick-label">Quick Actions</p>
      <button class="d-quick-btn primary" id="dCreateBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <path d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
        Add Item
      </button>
      <button class="d-quick-btn" id="dQuickBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <path d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
        Quick Entry
      </button>
      <button class="d-quick-btn kitchen" id="dKitchenBtn"
              onclick="window.location.href='kitchen.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Plan Meal
      </button>
    </div>

    <button class="d-back-btn" id="backBtn" aria-label="Go back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <path d="M15.75 19.5 8.25 12l7.5-7.5"/>
      </svg>
      Back
    </button>
  </aside>

  <!-- DESKTOP MAIN CONTENT -->
  <div class="d-main">
    <div class="d-topbar">
      <div class="d-topbar-left">
        <h1 class="d-page-title">Inventory List</h1>
        <span class="d-page-sub">Manage your kitchen ingredients</span>
      </div>
      <div class="d-topbar-right">
        <div class="search-wrap d-search">
          <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
          </svg>
          <input class="search-input" id="searchInput" type="text"
            placeholder="Search items…" autocomplete="off"/>
          <button class="search-clear" id="searchClear" aria-label="Clear">✕</button>
        </div>
      </div>
    </div>

    <div class="d-section-header">
      <span class="section-title" id="dSectionTitle">Recently Added</span>
      <button class="see-all-btn" id="seeAllBtn">See All</button>
    </div>

    <div class="d-items-grid" id="itemsList"></div>
  </div>
</div>


<!-- ═══════════════════════════════════════════════════════
     MOBILE LAYOUT  (< 900px)
═══════════════════════════════════════════════════════ -->
<div class="mobile-layout">

  <header class="topbar">
    <button class="back-btn" id="mBackBtn" aria-label="Go back">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2.4" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
      </svg>
    </button>
    <h1 class="topbar-title">Inventory List</h1>
    <div class="topbar-spacer" aria-hidden="true"></div>
  </header>

  <main class="content">
    <div class="items-heading"><h2>Items</h2></div>

    <div class="cta-row">
      <button class="cta-btn" id="createNewBtn">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2.4" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
        Create New
      </button>
      <button class="cta-btn" id="quickEntryBtn">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2.4" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
        Quick Entry
      </button>
    </div>

    <div class="section-header">
      <span class="section-title">Recently Added</span>
      <button class="see-all-btn" id="mSeeAllBtn">See All</button>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
      </svg>
      <input class="search-input" id="mSearchInput" type="text"
        placeholder="Search items…" autocomplete="off"/>
      <button class="search-clear" id="mSearchClear" aria-label="Clear">✕</button>
    </div>

    <div class="items-list" id="mItemsList"></div>
  </main>

  <!-- Mobile bottom nav -->
  <nav class="m-bottom-nav">
    <a class="m-nav-item active" href="inventory.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      <span>Inventory</span>
    </a>
    <a class="m-nav-item" href="kitchen.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Kitchen</span>
    </a>
    <a class="m-nav-item" href="mise_ai_vision.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7.5 3.75H6A2.25 2.25 0 0 0 3.75 6v1.5M16.5 3.75H18A2.25 2.25 0 0 1 20.25 6v1.5m0 9V18A2.25 2.25 0 0 1 18 20.25h-1.5m-9 0H6A2.25 2.25 0 0 1 3.75 18v-1.5M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
      </svg>
      <span>Scan</span>
    </a>
    <a class="m-nav-item" href="voice_redesign.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8"  y1="22" x2="16" y2="22"/>
      </svg>
      <span>Voice</span>
    </a>
  </nav>
</div>

<!-- ── MODAL (shared, desktop + mobile) ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Add New Item</h3>
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label" for="itemName">Item Name</label>
        <input class="field-input" id="itemName" type="text"
          placeholder="e.g. Tomato Paste" autocomplete="off"/>
      </div>
      <div class="field">
        <label class="field-label" for="itemQty">Quantity</label>
        <input class="field-input" id="itemQty" type="text"
          placeholder="e.g. 2 Sachets" autocomplete="off"/>
      </div>
      <div class="field">
        <label class="field-label">Icon</label>
        <!-- Emoji picker trigger + expandable panel -->
        <div class="epick-wrap" id="emojiPickerWrap">
          <button type="button" class="epick-trigger" id="emojiTrigger" aria-haspopup="true" aria-expanded="false">
            <span class="epick-preview" id="emojiPreview">
              <img src="mise_ai_logo.png" class="epick-preview-img" alt="Mise AI">
            </span>
            <span class="epick-label" id="emojiLabel">Mise AI Logo (default)</span>
            <svg class="epick-chevron" id="emojiChevron" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>

          <div class="epick-panel" id="emojiPanel" role="listbox" aria-label="Choose an icon">
            <div class="epick-panel-body">
              <!-- Category tabs -->
              <div class="epick-cats" id="emojiCats"></div>
              <!-- Emoji grid -->
              <div class="epick-grid" id="emojiGrid"></div>
            </div>
          </div>
        </div>

        <!-- Hidden value carrier — still consumed by saveModal() -->
        <input type="hidden" id="itemEmoji">
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-save"   id="modalSave">Add Item</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="inventory.js"></script>
<script src="inventory_patch.js"></script>
<script>
/* ── DESKTOP BRIDGE ──────────────────────────────────────────
   inventory.js handles all rendering and mobile wiring.
   inventory_patch.js handles localStorage sync + Plan Meal btn.
   This script only wires the desktop sidebar-specific buttons.
────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  const dCreate = document.getElementById('dCreateBtn');
  const dQuick  = document.getElementById('dQuickBtn');
  if (dCreate) dCreate.addEventListener('click', () => openModal('Add New Item'));
  if (dQuick)  dQuick.addEventListener('click',  () => quickEntry());
});
</script>

</body>
</html>
